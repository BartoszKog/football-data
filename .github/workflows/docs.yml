name: Zbuduj i opublikuj dokumentację

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zależności
        run: uv sync --group dev

      - name: Zbudowanie dokumentacji
        run: uv run mkdocs build

      - name: Przekazanie plików do publikacji
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publikacja na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4