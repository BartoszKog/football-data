site_name: Football Data Docs
site_description: Dokumentacja projektu football-data - modele Poisson/Dixon-Coles i XGBoost do typowania w Supertyperze.
site_author: Bartosz Kogutowicz
docs_dir: docs
site_dir: site

use_directory_urls: false

theme:
  name: shadcn
  custom_dir: overrides
  icon: lucide:goal
  show_stargazers: false
  show_datetime: true
  topbar_sections: true
  pygments_style:
    light: shadcn-light
    dark: github-dark
  katex_options: {}

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - codehilite
  - fenced_code
  - shadcn.extensions.iconify
  - shadcn.extensions.hover_card
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.caption

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            heading_level: 3

validation:
  nav:
    omitted_files: info
    not_found: warn
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore
